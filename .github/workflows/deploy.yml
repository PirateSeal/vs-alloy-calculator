name: CI/CD Pipeline

on:
  push:
    branches: [master]
    tags:
      - 'v*'
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  AWS_REGION: eu-west-1
  S3_BUCKET: ${{ secrets.S3_BUCKET_NAME }}
  CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9.15.0

      - name: Install dependencies
        run: pnpm install

      - name: Run tests with coverage
        run: pnpm test -- --coverage

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: |
            coverage/
          retention-days: 7

      - name: Build application
        run: pnpm run build:prod

      - name: Upload build artifacts
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v7
        with:
          name: build-artifacts
          path: dist/
          retention-days: 1

  deploy:
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-artifacts
          path: dist/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync fingerprinted assets to S3 (immutable, 1 year)
        run: |
          aws s3 sync dist/assets s3://${{ env.S3_BUCKET }}/assets \
            --delete \
            --cache-control "public, max-age=31536000, immutable"

      - name: Sync images to S3 (1 day, must revalidate)
        run: |
          aws s3 sync dist/ s3://${{ env.S3_BUCKET }} \
            --exclude "*" \
            --include "*.png" \
            --include "*.jpg" \
            --include "*.jpeg" \
            --include "*.webp" \
            --include "*.gif" \
            --include "*.ico" \
            --include "*.svg" \
            --cache-control "public, max-age=86400, must-revalidate"

      - name: Sync sitemap to S3 (1 hour, explicit XML content-type)
        run: |
          aws s3 sync dist/ s3://${{ env.S3_BUCKET }} \
            --exclude "*" \
            --include "sitemap*.xml" \
            --cache-control "public, max-age=3600, must-revalidate" \
            --content-type "application/xml; charset=utf-8"

      - name: Sync robots.txt to S3 (1 hour, explicit text content-type)
        run: |
          aws s3 sync dist/ s3://${{ env.S3_BUCKET }} \
            --exclude "*" \
            --include "robots.txt" \
            --cache-control "public, max-age=3600, must-revalidate" \
            --content-type "text/plain; charset=utf-8"

      - name: Sync HTML and remaining files to S3 (revalidate, edge-cache 5 min)
        run: |
          aws s3 sync dist/ s3://${{ env.S3_BUCKET }} \
            --delete \
            --exclude "assets/*" \
            --exclude "*.png" \
            --exclude "*.jpg" \
            --exclude "*.jpeg" \
            --exclude "*.webp" \
            --exclude "*.gif" \
            --exclude "*.ico" \
            --exclude "*.svg" \
            --exclude "robots.txt" \
            --exclude "sitemap*.xml" \
            --cache-control "public, max-age=0, s-maxage=300, must-revalidate"

      - name: Invalidate CloudFront cache and wait for completion
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*" \
            --query 'Invalidation.Id' \
            --output text)

          echo "Waiting for invalidation $INVALIDATION_ID to complete..."
          aws cloudfront wait invalidation-completed \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --id $INVALIDATION_ID

          echo "Invalidation completed successfully!"

      - name: Notify IndexNow of changed URLs
        continue-on-error: true
        env:
          CURRENT_TAG: ${{ github.ref_name }}
          SITE_HOST: vs-calculator.tcousin.com
          INDEXNOW_KEY: 9a08b561-2653-4193-8c5e-1ff8e28810ce
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 "${CURRENT_TAG}^" 2>/dev/null || echo "")
          echo "PREV_TAG=$PREV_TAG CURRENT_TAG=$CURRENT_TAG"
          PREV_TAG="$PREV_TAG" node scripts/indexnow-submit.mjs

      - name: Create build archive
        run: |
          cd dist
          zip -r ../build.zip .
          cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.6.1
        with:
          files: build.zip
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate deployment summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ✅ Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed to:** \`${{ env.S3_BUCKET }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Region:** \`${{ env.AWS_REGION }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Build Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Total files deployed: \`$(find dist -type f | wc -l)\`" >> $GITHUB_STEP_SUMMARY
          echo "- Build archive: \`build.zip\` (attached to release)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🌐 Live URLs" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Production:** https://vs-calculator.tcousin.com" >> $GITHUB_STEP_SUMMARY
          echo "- **CloudFront:** https://\`${{ env.CLOUDFRONT_DISTRIBUTION_ID }}\`.cloudfront.net" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ⚡ Cache Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "CloudFront cache invalidated - changes should be live within 1-2 minutes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "_Deployed at $(date -u '+%Y-%m-%d %H:%M:%S UTC')_" >> $GITHUB_STEP_SUMMARY
